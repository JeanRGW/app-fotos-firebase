name: app_envio
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
    sdk: ^3.9.0

dependencies:
    flutter:
        sdk: flutter
    firebase_core: ^4.2.1
    cloud_firestore: ^6.1.0
    firebase_auth: ^6.1.2
    firebase_storage: ^13.0.4
    geolocator: ^14.0.2
    image_picker: ^1.1.2
    sqflite: ^2.4.1
    path: ^1.9.1
    path_provider: ^2.1.5
    connectivity_plus: ^6.1.1
    permission_handler: ^11.3.1
    uuid: ^4.5.1
    mask_text_input_formatter: ^2.9.0

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^5.0.0
    flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
    android: true
    ios: true
    web:
        generate: true
    windows:
        generate: true
    macos:
        generate: true
    image_path: assets/icon/app_icon.png

flutter:
    uses-material-design: true
    assets:
        - assets/images/example_photo.jpeg
